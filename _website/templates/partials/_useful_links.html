{% load i18n %}
{% load md %}

<div class="jumbotron info useful-links">
  <h1>{% trans 'useful_links' %}</h1>
  <hr>
  <ul>
    {% for link in useful_links %}
      <li>
        <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.title }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
